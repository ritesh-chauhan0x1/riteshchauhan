<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Ritesh Chauhan Portfolio</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home-unique.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation will be inserted by JavaScript -->
    <div class="particles-container" id="particles-container"></div>
    <main class="main-content">
        <section class="hero-section">
            <div class="hero-content">
                <div class="profile-card-3d" id="profile-card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="profile-image-container">
                                <div class="profile-image">
                                    <i class="fas fa-user-tie"></i>
                                </div>
                                <div class="status-indicator"></div>
                            </div>
                            <h1 class="profile-name">Ritesh Chauhan</h1>
                            <p class="profile-title">Full Stack Developer & Designer</p>
                        </div>
                    </div>
                </div>
                <div class="hero-text">
                    <h2 class="hero-title">
                        <span class="title-line">Welcome to My Unique Home Page</span>
                    </h2>
                    <p class="hero-description">
                        This is a uniquely styled home page for Ritesh Chauhan's portfolio, featuring custom 3D effects and a modern layout.
                    </p>
                    <div class="hero-buttons">
                        <a href="about.html" class="btn-3d btn-primary">
                            <span class="btn-text">About Me</span>
                            <span class="btn-icon"><i class="fas fa-user"></i></span>
                        </a>
                        <a href="contact.html" class="btn-3d btn-secondary">
                            <span class="btn-text">Get In Touch</span>
                            <span class="btn-icon"><i class="fas fa-paper-plane"></i></span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
        <section class="unique-gallery-section">
            <h3 class="section-title">Unique 3D Gallery</h3>
            <div class="unique-gallery">
                <div class="unique-gallery-card">
                    <img src="1.jpeg" alt="Unique 1" class="unique-gallery-image">
                    <div class="unique-gallery-info">Modern UI</div>
                </div>
                <div class="unique-gallery-card">
                    <img src="2.jpeg" alt="Unique 2" class="unique-gallery-image">
                    <div class="unique-gallery-info">Responsive Design</div>
                </div>
                <div class="unique-gallery-card">
                    <img src="3.jpeg" alt="Unique 3" class="unique-gallery-image">
                    <div class="unique-gallery-info">Fast Performance</div>
                </div>
            </div>
        </section>
    </main>
    <script defer src="js/base.js"></script>
    <script defer src="js/home-unique.js"></script>
</body>
</html>

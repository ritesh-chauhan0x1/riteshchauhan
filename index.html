<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ritesh Chauhan</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      transition: background 0.6s ease;
      background-color: #ffffff;
      color: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background-color: inherit;
      z-index: 0;
      pointer-events: none;
    }

    .dark {
      background-color: #1e1e1e;
      color: #ffffff;
    }

    .circle.animate {
      animation: zoom 0.8s ease forwards;
    }

    @keyframes zoom {
      0% {
        transform: scale(0);
        opacity: 1;
      }
      100% {
        transform: scale(50);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="text">Ritesh Chauhan</div>

  <script>
    const body = document.body;
    const container = document.getElementById('text');

    container.addEventListener('click', function (e) {
      const circle = document.createElement('div');
      circle.classList.add('circle');
      const size = Math.max(window.innerWidth, window.innerHeight) * 2;
      circle.style.width = circle.style.height = size + 'px';
      circle.style.left = (e.clientX - size / 2) + 'px';
      circle.style.top = (e.clientY - size / 2) + 'px';
      circle.style.backgroundColor = getComputedStyle(body).backgroundColor;
      circle.classList.add('animate');
      document.body.appendChild(circle);

      setTimeout(() => {
        body.classList.toggle('dark');
      }, 150);

      setTimeout(() => {
        circle.remove();
      }, 800);
    });
  </script>
</body>
</html>

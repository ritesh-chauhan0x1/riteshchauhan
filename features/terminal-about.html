<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal About Me - Ritesh Chauhan</title>
    <link rel="stylesheet" href="terminal-about.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="terminal-button close"></span>
                <span class="terminal-button minimize"></span>
                <span class="terminal-button maximize"></span>
            </div>
            <div class="terminal-title">ritesh@portfolio:~$</div>
        </div>
        
        <div class="terminal-body" id="terminal">
            <div class="terminal-line">
                <span class="prompt">ritesh@portfolio:~$</span>
                <span class="cursor">|</span>
            </div>
        </div>

        <div class="command-suggestions">
            <h3>💡 Try these commands:</h3>
            <div class="suggestions-grid">
                <button class="suggestion-btn" onclick="executeCommand('whoami')">whoami</button>
                <button class="suggestion-btn" onclick="executeCommand('skills')">skills</button>
                <button class="suggestion-btn" onclick="executeCommand('projects')">projects</button>
                <button class="suggestion-btn" onclick="executeCommand('education')">education</button>
                <button class="suggestion-btn" onclick="executeCommand('experience')">experience</button>
                <button class="suggestion-btn" onclick="executeCommand('contact')">contact</button>
                <button class="suggestion-btn" onclick="executeCommand('achievements')">achievements</button>
                <button class="suggestion-btn" onclick="executeCommand('help')">help</button>
                <button class="suggestion-btn" onclick="executeCommand('cat resume.pdf')">cat resume.pdf</button>
                <button class="suggestion-btn" onclick="executeCommand('ls -la')">ls -la</button>
                <button class="suggestion-btn" onclick="executeCommand('neofetch')">neofetch</button>
                <button class="suggestion-btn" onclick="executeCommand('sudo make-me-coffee')">sudo make-me-coffee</button>
            </div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <script src="terminal-about.js"></script>
</body>
</html>
